name: Simple Workflow

on:
  workflow_dispatch:


jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
     - name: CheckOut Code
       uses: actions/checkout@v4

     - name: Setup Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.12"
        
     - name: Print the Message
       run: python -c "print('Hello World!')" 