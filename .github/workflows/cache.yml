name: Cache (concept)

on:
  workflow_dispatch:

jobs:
  simple-job:
    runs-on: ubuntu-latest

    steps:
      - name: Restore cache
        id: cache
        uses: actions/cache@v4
        with:
          path: demo-cache
          key: demo-cache-key

      - name: Create cache data (only if cache miss)
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss!"
            mkdir -p demo-cache
            date > demo-cache/timestamp.txt
          else
            echo "Cache hit!"
          fi

      - name: Show cache content
        run: cat demo-cache/timestamp.txt || echo "No cache file"